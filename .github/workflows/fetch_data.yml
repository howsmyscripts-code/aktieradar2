name: Fetch Stock Data

on:
  schedule:
    - cron: '0 7-21 * * 1-5'   # Varje hel timme 09:00-23:00 svensk tid (sommar) / 08:00-22:00 (vinter)
    - cron: '10 20 * * 1-5'      # Extra körning kl 22:10 svensk tid (sommar) - redundans runt US-stängning
  push:
    branches: [main]
    paths:
      - 'fetch_data.py'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch stock data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.json
          [ -f accuracy.json ] && git add accuracy.json
          [ -f news_cache.json ] && git add news_cache.json
          [ -f prev_signals.json ] && git add prev_signals.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stock data $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
