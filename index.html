<!DOCTYPE html>
<html lang="sv" data-theme="dark">
<head>
  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

  <title>AktieRadar</title>
  <style>
    :root{--bg:#07070f;--bg2:#0e0e1a;--bg3:#111;--text:#ddd;--text2:#aaa;--text3:#555;--text4:#333;--border:#181825;--border2:#1e1e2e;--sep:#2a2a3a}
    [data-theme="light"]{--bg:#f2f2f7;--bg2:#ffffff;--bg3:#e5e5ea;--text:#000;--text2:#3c3c43;--text3:#8e8e93;--text4:#c6c6c8;--border:#e5e5ea;--border2:#d1d1d6;--sep:#c6c6c8}
    
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,monospace;min-height:100vh;padding:env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,20px);transition:background 0.3s,color 0.3s}
    
    
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 12px 10px;max-width:540px;margin:0 auto}
    .header-title{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-1px;text-align:center}
    .header-title span{color:#ff4444}
    .header-note{font-size:9px;color:var(--text4);margin-top:3px;letter-spacing:2px;text-align:center;text-transform:uppercase}
    .topbar{display:flex;flex-direction:column;align-items:center;padding:10px 12px 4px;max-width:540px;margin:0 auto;gap:6px}
    .topbar-left{display:flex;flex-direction:column;align-items:center;gap:3px}
    .refresh-btn{background:#ff4444;color:#fff;border:none;padding:8px 16px;font-size:11px;font-weight:700;border-radius:4px;cursor:pointer;font-family:monospace;letter-spacing:1px;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .refresh-btn:disabled{background:#1a1a1a;color:var(--text3);cursor:not-allowed}
    .last-updated{font-size:10px;color:var(--text2);letter-spacing:1px;text-align:center}
    .status-text{font-size:9px;color:var(--text3);letter-spacing:1px;text-align:center}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .spin{display:inline-block;animation:spin 1s linear infinite}
    .market-bar{max-width:540px;margin:8px auto 0;padding:0 12px}
    .market-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
    .market-item{background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:4px 4px;text-align:center;transition:all 0.3s;min-width:0;overflow:hidden}.market-item.ath{border-color:#ffaa00;background:var(--bg2);box-shadow:0 0 8px #ffaa0066}.market-ath{font-size:7px;color:#ffaa00;margin-top:1px;letter-spacing:1px;display:none}.market-item.ath .market-ath{display:block}
    .market-detail{display:block;margin-top:6px;padding-top:6px;border-top:1px solid var(--border2);text-align:left}
    
    .market-detail-row{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px;font-family:monospace}
    .market-detail-label{color:var(--text3);letter-spacing:1px}
    .market-detail-value{color:var(--text);font-weight:700}
    .market-item{cursor:pointer}
    .market-name{font-size:9px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:2px;font-family:monospace}
    .market-price{font-size:10px;font-weight:700;color:var(--text);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .market-change{font-size:8px;font-weight:700;margin-top:1px}
    .tabs-top{display:flex;gap:6px;padding:8px 12px 4px;max-width:540px;margin:0 auto;justify-content:center}
    .tab-top{padding:8px 18px;font-size:12px;font-weight:700;font-family:monospace;border:1px solid #1e1e2e;background:var(--bg2);color:var(--text3);cursor:pointer;text-transform:uppercase;border-radius:4px;letter-spacing:0.5px;white-space:nowrap;transition:all 0.2s}
    .tab-top.active{border-color:var(--c,#00cc66);color:var(--c,#00cc66)}
    .tabs{display:flex;overflow:hidden;gap:0;padding:0 8px 0;max-width:540px;margin:0 auto;justify-content:center}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;padding:11px 10px;font-size:11px;font-family:monospace;letter-spacing:0;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);cursor:pointer;text-transform:uppercase;border-radius:4px 4px 0 0;margin-right:2px;white-space:nowrap}
    .tab.active{background:var(--bg2);color:var(--text);border-bottom-color:var(--bg2)}.tab.portfolio-tab{color:#00cc66;border-color:#00cc6633}.tab.swing-tab{color:#ffaa00;border-color:#ffaa0033}.tab.swing-tab.active{color:#ffaa00;border-color:#ffaa00}.tab.portfolio-tab.active{color:#00cc66}
    .legend{display:flex;justify-content:center;gap:16px;padding:7px 16px;font-size:10px}
    .legend-item{display:flex;align-items:center;gap:4px}
    .legend-dot{width:6px;height:6px;border-radius:50%}
    .list{padding:0 12px 12px;display:none;flex-direction:column;gap:8px;max-width:540px;margin:0 auto}
    .list.active{display:flex}
    .card{border-radius:12px;overflow:hidden;border:1px solid var(--border2);transition:border-color 0.2s,box-shadow 0.2s}
    .card.open{border-color:var(--c)}
    .card-row{width:100%;background:var(--bg2);border:none;padding:13px 14px;display:grid;grid-template-columns:90px 1fr 150px;align-items:center;cursor:pointer;gap:4px;transition:background 0.2s}
    .card.open .card-row{background:var(--bg2)}
    .card-left{display:flex;flex-direction:column;align-items:flex-start;overflow:hidden}
    .card-ticker{font-size:12px;font-weight:700;color:var(--text);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px}
    .card-sektor{font-size:9px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px}.card-smeknamn{font-size:9px;color:#666;margin-top:1px;font-style:italic}.card-live-price{font-size:11px;color:var(--text2);font-family:monospace;margin-top:3px;letter-spacing:0.5px;white-space:nowrap}.card-nickname{font-size:9px;color:var(--text3);margin-top:2px;font-style:italic}
    .dots{display:flex;gap:3px;flex:1;justify-content:center;min-width:0}
    .dot{width:5px;height:5px;border-radius:50%;background:#1e1e2e;flex-shrink:0}
    .dot.on{background:var(--c)}
    .card-right{display:flex;align-items:center;gap:4px;justify-content:flex-end;overflow:hidden}
    .card-signal{font-size:11px;font-weight:900;color:var(--c);letter-spacing:1px;white-space:nowrap;min-width:48px;text-align:right}
    .card-price{font-size:10px;color:#666;white-space:nowrap;margin-right:2px}.card-change{font-size:10px;font-weight:700;white-space:nowrap;width:46px;text-align:right}
    .card-arrow{color:var(--text4);font-size:10px;transition:transform 0.2s;width:12px;text-align:center;flex-shrink:0}.heart{font-size:22px;color:var(--text4);cursor:pointer;transition:color 0.2s;-webkit-tap-highlight-color:transparent;padding:2px 4px;line-height:1;width:30px;text-align:center;flex-shrink:0}.heart.fav{color:#ff4444}
    .card.open .card-arrow{transform:rotate(180deg)}
    .card-body{display:none;background:var(--bg2);border-top:1px solid var(--border);padding:14px}
    .card.open .card-body{display:block}
    .bar-track{background:var(--bg3);height:3px;border-radius:2px;margin-bottom:12px}
    .bar-fill{height:100%;border-radius:2px;background:var(--c)}
    .card-name-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .card-name{font-size:14px;font-weight:700;color:var(--text)}
    .card-styrka{font-size:10px;color:var(--text3)}
    .tech-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
    .tech-badge{padding:4px 8px;border-radius:4px;font-size:10px;font-family:monospace;letter-spacing:1px;background:var(--bg3);border:1px solid var(--border2)2;white-space:nowrap}
    .summary{font-size:12px;line-height:1.7;color:#888;border-left:2px solid var(--c);padding-left:10px;margin-bottom:12px}
    .section-label{font-size:9px;letter-spacing:4px;color:var(--text2);margin-bottom:7px;text-transform:uppercase}
    .reason-row,.risk-row{display:flex;gap:8px;margin-bottom:7px;font-size:11px;line-height:1.5;align-items:flex-start;color:var(--text)}
    .reason-row{color:var(--text)}.risk-row{color:var(--text2)}
    .reason-icon{color:#00cc66;flex-shrink:0;font-weight:700}.risk-icon{color:#ff4444;flex-shrink:0}
    .risks{margin-top:12px}
    .invest-btn{display:block;width:100%;margin-top:14px;padding:11px;background:var(--c);color:#000;font-family:monospace;font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;text-decoration:none;text-align:center}
    .loading-overlay{position:fixed;inset:0;background:rgba(7,7,15,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#ff4444;letter-spacing:5px;margin-top:16px;text-transform:uppercase}
    .loading-sub{font-size:14px;color:var(--text);letter-spacing:1px;margin-top:10px;font-weight:600;text-align:center;max-width:300px}
    .loading-progress{font-size:11px;color:#666;margin-top:6px;letter-spacing:2px}
    .loading-bar-track{width:260px;height:3px;background:var(--bg3);border-radius:2px;margin-top:14px}
    .loading-bar-fill{height:100%;background:#ff4444;border-radius:2px;transition:width 0.4s ease}
    .info-banner{background:var(--bg);border:1px solid #2a2a4a;color:#666;font-size:11px;padding:10px 14px;margin:6px 12px;border-radius:6px;text-align:center;max-width:516px;margin-left:auto;margin-right:auto;line-height:1.6}
    .portfolio-container{padding:0 12px 12px;max-width:540px;margin:0 auto;display:none;flex-direction:column;gap:10px}
    .portfolio-container.active{display:flex}
    .portfolio-add{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:16px}
    .portfolio-add h3{font-size:11px;letter-spacing:3px;color:var(--text3);margin-bottom:12px}
    .portfolio-input-row{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
    .portfolio-input{background:var(--bg2);border:1px solid var(--sep);color:var(--text);padding:10px 12px;font-size:13px;border-radius:4px;outline:none;font-family:monospace;width:100%}
    .portfolio-btn{background:#00cc66;color:#000;border:none;padding:12px;font-size:12px;font-weight:700;border-radius:4px;cursor:pointer;font-family:monospace;letter-spacing:1px;width:100%}
    .portfolio-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:6px}
    .portfolio-card-top{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px}
    .portfolio-ticker{font-size:14px;font-weight:700;color:var(--text);letter-spacing:1px;min-width:100px}
    .portfolio-value{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap}
    .portfolio-detail{display:grid;grid-template-columns:1fr auto;align-items:start;font-size:11px;color:var(--text3);gap:6px;margin-top:4px}
    .portfolio-pnl{font-size:13px;font-weight:700}
    .portfolio-remove{background:none;border:none;color:var(--text4);cursor:pointer;font-size:16px;padding:0 4px}
    .ticker-wrapper{position:relative;width:100%}
    .ticker-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--sep);border-top:none;border-radius:0 0 4px 4px;z-index:100;max-height:180px;overflow-y:auto;display:none}
    .ticker-option{padding:9px 10px;font-size:11px;font-family:monospace;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border)}
    .ticker-option:last-child{border-bottom:none}
    .ticker-option:active{background:#1a1a2e}
    .ticker-sym{color:var(--text);font-weight:700;margin-right:6px}
    .ticker-name{color:var(--text3)}
    .portfolio-total{background:var(--bg3);border:1px solid var(--sep);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:border-color 0.2s}.portfolio-total:active{border-color:#00cc66}.{margin-top:14px;display:none}.period-btns{display:flex;gap:6px;margin-bottom:10px;justify-content:center}.period-btn{background:var(--bg3);border:1px solid var(--sep);color:var(--text3);padding:5px 12px;font-size:10px;font-family:monospace;border-radius:4px;cursor:pointer;letter-spacing:1px}.period-btn.active{background:#00cc6622;border-color:#00cc66;color:#00cc66}/* .history-canvas{width:100%;height:100px;display:block}.history-empty{font-size:10px;color:var(--text4);letter-spacing:2px;padding:20px 0;text-align:center}
    .portfolio-total-label{font-size:9px;color:var(--text);letter-spacing:4px;margin-bottom:6px}
    .portfolio-total-value{font-size:22px;font-weight:900;color:var(--text)}
    .portfolio-total-pnl{font-size:12px;margin-top:4px}
    
    .news-section{margin-top:14px}
    .news-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;text-decoration:none;display:block}
    .news-item:last-child{border-bottom:none}
    .news-title{font-size:11px;color:var(--text);line-height:1.5;margin-bottom:3px}
    .news-meta{font-size:9px;color:var(--text3);letter-spacing:1px}
    .news-loading{font-size:10px;color:var(--text4);letter-spacing:2px;padding:8px 0}
    .news-links{display:flex;flex-direction:column;gap:8px;margin-top:4px}
    .news-link-btn{display:block;padding:10px 12px;background:var(--bg3);border:1px solid var(--sep);border-radius:6px;font-size:12px;color:var(--text2);text-decoration:none;cursor:pointer}
    .news-link-btn:active{background:#1a1a2e;color:#fff}
    
  
    /* ── Modal ─────────────────────────────────────────────── */
    .modal-overlay{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.6);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .25s ease;
    }
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal-sheet{
      width:100%;max-width:540px;
      background:var(--bg2);
      border-radius:20px 20px 0 0;
      padding:20px 20px 40px;
      max-height:85vh;overflow-y:auto;
      transform:translateY(100%);
      transition:transform .3s cubic-bezier(.32,.72,0,1);
    }
    .modal-overlay.open .modal-sheet{transform:translateY(0)}
    .modal-handle{
      width:36px;height:4px;border-radius:2px;
      background:var(--border2);margin:0 auto 16px;
    }
    .modal-close{
      position:absolute;top:16px;right:16px;
      background:var(--bg3);border:none;color:var(--text2);
      width:30px;height:30px;border-radius:50%;
      font-size:16px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    
    /* ── Pull to refresh ───────────────────────────────────── */
    .ptr-indicator{
      position:fixed;top:0;left:50%;transform:translateX(-50%);
      z-index:200;display:flex;align-items:center;justify-content:center;
      width:36px;height:36px;border-radius:50%;
      background:var(--bg2);border:1px solid var(--border2);
      box-shadow:0 2px 12px rgba(0,0,0,.3);
      opacity:0;transition:opacity .2s;
      pointer-events:none;
    }
    .ptr-indicator.visible{opacity:1}
    .ptr-spinner{
      width:18px;height:18px;border-radius:50%;
      border:2px solid var(--border2);border-top-color:var(--blue,#4d9fff);
    }
    .ptr-spinner.spin{animation:spin .7s linear infinite}
    </style>
</head>
<body>
<!-- Pull to refresh indicator -->
<div class="ptr-indicator" id="ptr-indicator">

</div>
<div class="header">
  <button id="notif-btn" onclick="requestNotifications()" title="Aktivera notiser" style="background:var(--bg2);border:1px solid var(--border2);color:var(--text3);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">🔔︎</button>
  <div>

<script>
const STOCKS = {

async function loadData() {
  try {
    const r = await fetch("data.json?t=" + Date.now());
    if (!r.ok) throw new Error("Ingen data.json");
    const d = await r.json();
    stockData = d.stocks || {};
    window._fearGreed = d.fear_greed || null;
    window._earningsMap = {};
    return d.updated || null;
  } catch(e) {
    return null;
  }
}

function loadStock(s) {
  if (!s.sym) return;
  const d = stockData[s.sym];
  if (d && d.ok) {
    liveData[s.sym] = d;
  } else {
    liveData[s.sym] = {ok: false, error: d?.error || "Ingen data"};
  }
}

function timeAgo(date){
  const diff = Math.floor((Date.now() - date) / 1000);
  if(diff < 3600) return Math.floor(diff/60) + 'm sedan';
  if(diff < 86400) return Math.floor(diff/3600) + 'h sedan';
  return Math.floor(diff/86400) + 'd sedan';
}

function tickerSearch(input){
  const q = input.value.trim().toUpperCase();
  const dd = document.getElementById("ticker-dropdown");
  if(!q || q.length < 1){ dd.style.display="none"; return; }
  
  const matches = STOCK_INDEX.filter(s =>
    (s.sym && s.sym.toUpperCase().includes(q)) ||
    s.display.toUpperCase().includes(q) ||
    s.namn.toUpperCase().includes(q)
  ).slice(0, 8);
  
  if(!matches.length){ dd.style.display="none"; return; }
  
  dd.innerHTML = matches.map(s => `
    <div class="ticker-option" onmousedown="selectTicker('${s.sym}','${s.display}','${s.namn}')">
      <span class="ticker-sym">${s.display}</span>
      <span class="ticker-name">${s.namn}</span>
    </div>
  `).join("");
  dd.style.display = "block";
}

function savePortfolioSnapshot(value){
  if(!value || value <= 0) return;
  const history = JSON.parse(localStorage.getItem("portfolio_history") || "[]");
  const today = new Date().toISOString().split("T")[0];
  // Only save once per day
  if(history.length && history[history.length-1].date === today){
    history[history.length-1].value = value;
  } else {
    history.push({date: today, value: Math.round(value)});
    // Keep max 400 days
    if(history.length > 400) history.shift();
  }
  localStorage.setItem("portfolio_history", JSON.stringify(history));
}

function getHistoryByPeriod(months){
  const history = JSON.parse(localStorage.getItem("portfolio_history") || "[]");
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - months);
  return history.filter(h => new Date(h.date) >= cutoff);
}

function togglePortfolioHistory(){
  const hist = document.getElementById("-section");
  if(!hist) return;
  const isVisible = hist.style.display !== "none";
  hist.style.display = isVisible ? "none" : "block";
  if(!isVisible) drawHistoryChart(3);
}

function drawHistoryChart(months){
  // Update active button
  document.querySelectorAll(".period-btn").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.months) === months);
  });
  const canvas = document.getElementById("history-canvas");
  if(!canvas) return;
  const data = getHistoryByPeriod(months);
  if(data.length < 2){
    canvas.style.display = "none";
    const empty = document.getElementById("history-empty");
    if(empty) empty.style.display = "block";
    return;
  }
  canvas.style.display = "block";
  const empty = document.getElementById("history-empty");
  if(empty) empty.style.display = "none";
  const W = canvas.parentElement?.offsetWidth || 300;
  const H = 100;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext("2d");
  const closes = data.map(d => d.value);
  const min = Math.min(...closes);
  const max = Math.max(...closes);
  const range = max - min || 1;
  const pad = 8;
  const w = W - pad*2;
  const h = H - pad*2 - 16;
  const isUp = closes[closes.length-1] >= closes[0];
  const color = isUp ? "#00cc66" : "#ff4444";
  ctx.clearRect(0, 0, W, H);
  // Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, color+"44");
  grad.addColorStop(1, color+"00");
  ctx.beginPath();
  closes.forEach((v, i) => {
    const x = pad + (i/(closes.length-1))*w;
    const y = pad + (1-(v-min)/range)*h;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.lineTo(pad+w, pad+h);
  ctx.lineTo(pad, pad+h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  // Line
  ctx.beginPath();
  closes.forEach((v,i) => {
    const x = pad + (i/(closes.length-1))*w;
    const y = pad + (1-(v-min)/range)*h;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  // Labels
  ctx.fillStyle = "#333";

}

function renderPortfolio(){
  const container = document.getElementById("portfolio-holdings");
  const totalEl = document.getElementById("portfolio-total");
  const totalValEl = document.getElementById("ptotal-value");
  const totalPnlEl = document.getElementById("ptotal-pnl");
  if(!container) return;

  let totalValue = 0, totalCost = 0;
  container.innerHTML = "";

  // Sort portfolio
  const sortedPortfolio = [...portfolio].map((h, i) => ({...h, _origIdx: i}));
  if(portfolioSort === "value"){
    sortedPortfolio.sort((a,b)=>{
      const av = (liveData[a.ticker]?.ok ? liveData[a.ticker].price * a.antal : 0);
      const bv = (liveData[b.ticker]?.ok ? liveData[b.ticker].price * b.antal : 0);
      return bv - av;
    });
  } else if(portfolioSort === "pnl"){
    sortedPortfolio.sort((a,b)=>{
      const ap = liveData[a.ticker]?.ok ? (liveData[a.ticker].price - a.kurs)*a.antal : 0;
      const bp = liveData[b.ticker]?.ok ? (liveData[b.ticker].price - b.kurs)*b.antal : 0;
      return bp - ap;
    });
  } else if(portfolioSort === "pnlpct"){
    sortedPortfolio.sort((a,b)=>{
      const ap = liveData[a.ticker]?.ok ? ((liveData[a.ticker].price - a.kurs)/a.kurs)*100 : 0;
      const bp = liveData[b.ticker]?.ok ? ((liveData[b.ticker].price - b.kurs)/b.kurs)*100 : 0;
      return bp - ap;
    });
  } else if(portfolioSort === "added"){
    // Default order - no sort needed
  } else if(portfolioSort === "alpha"){
    sortedPortfolio.sort((a,b)=>(a.display||a.ticker).localeCompare(b.display||b.ticker));
  }

  sortedPortfolio.forEach((h, i) => {
    const live = liveData[h.ticker] || stockData[h.ticker];
    const currentPrice = live?.ok ? live.price : null;
    // Auto-lookup valuta from STOCK_INDEX if missing
    if(!h.valuta){
      const found = STOCK_INDEX.find(s=>s.sym===h.ticker);
      if(found) h.valuta = found.valuta;
    }
    const currentValue = currentPrice ? currentPrice * h.antal : null;
    const cost = h.kurs * h.antal;
    const pnl = currentValue !== null ? currentValue - cost : null;
    const pnlPct = pnl !== null ? (pnl / cost) * 100 : null;

    if(currentValue) { totalValue += currentValue; totalCost += cost; }

    const pnlColor = (pnl !== null && pnl >= 0) ? "#00cc66" : "#ff4444";
    const pnlSign = (pnl !== null && pnl >= 0) ? "+" : "";

    const card = document.createElement("div");
    card.className = "portfolio-card";
    card.innerHTML = `
      <div class="portfolio-card-top">
        <span class="portfolio-ticker">${h.display||h.ticker}</span>
        <span class="portfolio-value">${currentValue !== null ? currentValue.toLocaleString("sv-SE", {maximumFractionDigits:0})+" "+(h.valuta||"") : "—"} ${live?.ok?"":"(saknar data)"}</span>
        <button class="portfolio-remove" onclick="removeHolding(${h._origIdx !== undefined ? h._origIdx : i})">✕</button>
      </div>
      <div class="portfolio-detail">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">${h.antal} st × ${currentPrice !== null ? currentPrice.toFixed(2) : "—"} <span style="font-size:9px;color:var(--text3)">${h.valuta||""}</span> (köpt: ${h.kurs ? h.kurs.toFixed(2) : "—"} <span style="font-size:9px;color:var(--text3)">${h.valuta||""}</span>)</span>
        ${pnl!==null ? `<span class="portfolio-pnl" style="color:${pnlColor}">${pnlSign}${pnl !== null ? Math.abs(pnl).toLocaleString("sv-SE",{maximumFractionDigits:0}) : "—"} <span style="font-size:9px">${h.valuta||""}</span> (${pnlSign}${pnlPct !== null ? pnlPct.toFixed(1) : "0.0"}%)</span>` : ""}
      </div>
    `;
    container.appendChild(card);
  });

  // Group by currency
  const byCurrency = {};
  portfolio.forEach((h,i) => {
    const live = liveData[h.ticker];
    const cur = h.valuta || "—";
    if(!byCurrency[cur]) byCurrency[cur] = {value:0, cost:0};
    const currentPrice = live?.ok ? live.price : null;
    if(currentPrice){
      byCurrency[cur].value += currentPrice * h.antal;
      byCurrency[cur].cost += h.kurs * h.antal;
    }
  });

  if(portfolio.length > 0 && totalValue > 0){
    const lines = Object.entries(byCurrency)
      .filter(([cur,d])=>d.value>0)
      .map(([cur,d])=>{
        const pnl = d.value - d.cost;
        const pct = (pnl/d.cost)*100;
        const c = pnl>=0?"#00cc66":"#ff4444";
        return `<div style="margin-top:4px"><span style="color:var(--text2);font-size:11px">${d.value.toLocaleString("sv-SE",{maximumFractionDigits:0})} ${cur}</span> <span style="color:${c};font-size:11px">${pnl>=0?"+":""}${pnl !== null ? pnl.toLocaleString("sv-SE",{maximumFractionDigits:0}) : "—"} (${pnl>=0?"+":""}${typeof pct === "number" ? pct.toFixed(1) : "0.0"}%)</span></div>`;
      }).join("");
    totalValEl.innerHTML = lines || "—";
    totalPnlEl.innerHTML = "";
    const c = "#00cc66"; // keep for history section color ref
    // Add history section if not exists
    if(!document.getElementById("-section")){
      const histSection = document.createElement("div");
      histSection.id = "-section";
      histSection.className = "";
      histSection.innerHTML = `
        <div class="period-btns">
          <button class="period-btn active" data-months="3" onclick="drawHistoryChart(3)">3 MÅN</button>
          <button class="period-btn" data-months="6" onclick="drawHistoryChart(6)">6 MÅN</button>
          <button class="period-btn" data-months="12" onclick="drawHistoryChart(12)">12 MÅN</button>
        </div>
        
      `;
      totalEl.appendChild(histSection);
    }
    totalEl.style.display = "block";
    totalEl.onclick = togglePortfolioHistory;
    // Save snapshot
    savePortfolioSnapshot(totalValue);
  } else {
    if(totalEl) totalEl.style.display = "none";
  }
}

function getSwingStocks(){
  // Find stocks meeting swing trading criteria
  const swings = [];
  if(!stockData || Object.keys(stockData).length === 0) return swings;
  Object.values(STOCKS).flat().filter(s=>s.sym).forEach(s=>{
    const d = stockData[s.sym];
    if(!d?.ok) return;
    
    const rsi = d.rsi;
    const bb = d.bollinger;
    const styrka = d.styrka;
    const signal = d.signal;
    
    // Bullish swing: oversold + strong buy signal
    if(signal==="KOP" && styrka >= 7 && rsi !== null && rsi < 38){
      swings.push({
        stock: s, data: d,
        type: "KOP",
        reason: `RSI ${rsi} — översåld${bb<0.2?" · BB nära botten":""}`,
        score: styrka + (rsi < 30 ? 2 : 0) + (bb < 0.2 ? 1 : 0)
      });
    }
    // Bearish swing: overbought + strong sell signal  
    else if(signal==="SALJ" && styrka <= 3 && rsi !== null && rsi > 65){
      swings.push({
        stock: s, data: d,
        type: "SALJ",
        reason: `RSI ${rsi} — överköpt${bb>0.8?" · BB nära toppen":""}`,
        score: (10-styrka) + (rsi > 75 ? 2 : 0) + (bb > 0.8 ? 1 : 0)
      });
    }
  });
  
  // Sort by score
  return swings.sort((a,b)=>b.score-a.score);
}

// ── Swing History ──────────────────────────────────────────────
function saveSwingSnapshot(){
  const today = new Date().toISOString().split("T")[0];
  const hist = JSON.parse(localStorage.getItem("swing_hist") || "{}");
  if(hist[today]) return; // Already saved today
  const swings = getSwingStocks();
  if(!swings.length) return;
  hist[today] = swings.map(s=>({
    sym: s.stock.sym,
    namn: s.stock.namn,
    type: s.type,
    typeLabel: s.type==="KOP"?"KÖP":s.type==="SALJ"?"SÄLJ":"HÅLL",
    price: s.data.price,
    rsi: s.data.rsi,
    styrka: s.data.styrka,
    score: s.score
  }));
  // Keep max 30 days
  const keys = Object.keys(hist).sort();
  if(keys.length > 30) delete hist[keys[0]];
  localStorage.setItem("swing_hist", JSON.stringify(hist));
}

function renderSwingHistory(){
  const hist = JSON.parse(localStorage.getItem("swing_hist") || "{}");
  const keys = Object.keys(hist).sort().reverse().slice(0,7);
  if(!keys.length) return '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">Historik byggs upp dagligen</div>';

  return keys.map(date=>{
    const entries = hist[date];
    return `<div style="margin-bottom:12px">
      <div style="font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">${date}</div>
      ${entries.map(e=>{
        const d = stockData[e.sym];
        const pctChange = d?.ok ? (((d.price-e.price)/e.price)*100).toFixed(1) : null;
        const col = e.type==="KOP"?"var(--green)":"var(--red)";

        const resultCol = pctChange===null?"var(--text3)":
          (e.type==="KOP"?parseFloat(pctChange)>0:parseFloat(pctChange)<0)?"var(--green)":"var(--red)";
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
          <div>
            <span style="font-size:12px;font-weight:700;color:var(--text)">${e.namn}</span>

          </div>
          <div style="text-align:right">
            <div style="font-family:monospace;font-size:11px;color:var(--text2)">${e.price.toFixed(2)}</div>

  }).join("");
}


// ── Push notifications ──────────────────────────────────────────
async function requestNotifications(){
  if(!("Notification" in window)) return;
  const btn = document.getElementById("notif-btn");
  const enabled = localStorage.getItem("notif_enabled") === "true";
  if(enabled){
    // Turn off
    localStorage.setItem("notif_enabled","false");
    if(btn){ btn.textContent = "🔕︎"; btn.style.opacity="0.4"; }
    if(btn) btn.title = "Aktivera notiser";
  } else {
    // Turn on
    if(Notification.permission === "default"){
      const perm = await Notification.requestPermission();
      if(perm !== "granted") return;
    }
    if(Notification.permission === "granted"){
      localStorage.setItem("notif_enabled","true");
      if(btn){ btn.textContent = "🔔︎"; btn.style.opacity="1"; }
      if(btn) btn.title = "Stäng av notiser";
    }
  }
}

function initNotifBtn(){
  const btn = document.getElementById("notif-btn");
  if(!btn) return;
  const enabled = localStorage.getItem("notif_enabled") === "true";
  const granted = "Notification" in window && Notification.permission === "granted";
  btn.textContent = (enabled && granted) ? "🔔︎" : "🔕︎";
  btn.style.opacity = (enabled && granted) ? "1" : "0.4";
  btn.title = (enabled && granted) ? "Stäng av notiser" : "Aktivera notiser";
}

function sendSwingNotification(stock, data){
  if(Notification.permission !== "granted") return;
  const sig = data.signal === "KOP" ? "Köpläge" : "Säljläge";
  const n = new Notification(`⚡ ${stock.namn} — ${sig}`, {
    body: `RSI ${data.rsi} · Styrka ${data.styrka}/10 · ${data.change >= 0 ? "+" : ""}${data.change?.toFixed(1)}%`,
    icon: "/aktieradar2/icon.png",
    tag: stock.sym,
    renotify: true,
  });
  n.onclick = () => { window.focus(); switchTab("⚡ SWING"); };
}

let prevSwingSyms = new Set(JSON.parse(localStorage.getItem("prev_swings") || "[]"));

function checkSwingNotifications(){
  if(Notification.permission !== "granted") return;
  if(localStorage.getItem("notif_enabled") !== "true") return;
  const current = getSwingStocks();
  const currentSyms = new Set(current.map(s => s.stock.sym));
  
  // Only notify for NEW swing opportunities (not previously known)
  current.forEach(sw => {
    if(!prevSwingSyms.has(sw.stock.sym)){
      sendSwingNotification(sw.stock, sw.data);
    }
  });
  
  // Save current swings for next comparison
  prevSwingSyms = currentSyms;
  localStorage.setItem("prev_swings", JSON.stringify([...currentSyms]));
}

      t.onclick=()=>switchTab(cat);
      if(te2) te2.appendChild(t);
    } else {
    const tab=document.createElement("button");
    tab.className="tab"+(cat===activeTab?" active":"");
    tab.textContent=cat==="Favoriter"?"♥ FAV":cat;
    if(cat==="⚡ SWING") tab.classList.add("swing-tab");
    tab.onclick=()=>switchTab(cat);
    te.appendChild(tab);
    }
    const list=document.createElement("div");
      list.className="list"+(cat===activeTab?" active":"");
      list.id="list-"+cat;
      if(cat!=="Favoriter" && cat!=="⚡ SWING"){

function buildCard(s){
  const live=s.sym?liveData[s.sym]:null;
  const has=live?.ok;
  const signal=has?live.signal:(s.signal||"HALL");
  const styrka=has?live.styrka:(s.styrka||5);
  const c=COLORS[signal],bg=BGS[signal];
  const card=document.createElement("div");
  card.className="card";
  if(s.sym) card.dataset.sym = s.sym;
  card.style.setProperty("--c",c);card.style.setProperty("--bg",bg);
  const dots=Array.from({length:10},(_,i)=>`<div class="dot${i<styrka?" on":""}"></div>`).join("");
  let chHtml="",techHtml="",priceHtml="";
  if(has){
    const cc=live.change>=0?"#00cc66":"#ff4444";
    chHtml=`<span class="card-change" style="color:${cc}">${live.change>=0?"+":""}${live.change.toFixed(1)}%</span>`;
    priceHtml=`<span class="card-price">${live.price.toFixed(2)}</span>`;
    const rc=live.rsi<35?"#00cc66":live.rsi>65?"#ff4444":"#ffaa00";
    const mc=(live.ma50&&live.ma200)?(live.ma50>live.ma200?"#00cc66":"#ff4444"):"#555";
    techHtml=`<div class="tech-row">
      <span class="tech-badge" style="color:#ccc;border-color:var(--text4)">${live.price.toFixed(2)}</span>
      ${live.rsi!=null?`<span class="tech-badge" style="color:${rc};border-color:${rc}44">RSI ${live.rsi}</span>`:""}
      ${live.ma50!=null?`<span class="tech-badge" style="color:${mc};border-color:${mc}44">MA50 ${live.ma50}</span>`:""}
      ${live.ma200!=null?`<span class="tech-badge" style="color:${mc};border-color:${mc}44">MA200 ${live.ma200}</span>`:""}
    </div>`;
  }else if(!s.sym){
    techHtml=`<div class="tech-row"><span class="tech-badge" style="color:var(--text4)">Fondkurser hämtas ej automatiskt — se Avanza för aktuellt pris</span></div>`;
  }else if(live&&!live.ok){
    techHtml=`<div class="tech-row"><span class="tech-badge" style="color:#666;border-color:var(--text4)">Ej tillgänglig just nu</span></div>`;
  }else{
    techHtml=`<div class="tech-row"><span class="tech-badge" style="color:var(--text3)">Tryck Uppdatera för livedata</span></div>`;
  }
  const sum={
    KOP:`Teknisk analys pekar uppåt.${live?.rsi?` RSI ${live.rsi} indikerar köpläge.`:""}${(live?.ma50&&live?.ma200&&live.ma50>live.ma200)?" MA50 över MA200 — positiv trend.":""}`,
    HALL:`Teknisk analys neutral.${live?.rsi?` RSI ${live.rsi} i neutralt läge.`:""} Avvakta tydligare signal.`,
    SALJ:`Teknisk analys pekar nedåt.${live?.rsi?` RSI ${live.rsi} — överköpt läge.`:""}${(live?.ma50&&live?.ma200&&live.ma50<live.ma200)?" MA50 under MA200 — negativ trend.":""}`,
  };
  const summary=has?sum[signal]:"Tryck Uppdatera för teknisk analys.";
  // Earnings warning
  const earningsHtml=(()=>{
    const ed=live?.earnings_date || (window._earningsMap && window._earningsMap[s.sym]);
    if(!ed) return "";
    const today=new Date();
    const eDate=new Date(ed);
    const days=Math.round((eDate-today)/(1000*60*60*24));
    if(days<0||days>30) return "";
    const urgency=days<=7?"#ff4444":days<=14?"#ffaa00":"#4d9fff";
    return `<div style="background:${urgency}18;border:1px solid ${urgency}44;border-radius:6px;padding:7px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      <span style="font-size:14px">📅</span>
      <div>
        <div style="font-size:11px;font-weight:700;color:${urgency}">Rapport om ${days} dagar</div>
        <div style="font-size:10px;color:var(--text3)">${ed} — Teknisk analys kan vara missvisande</div>
      </div>
    </div>`;
  })();
  const reasons=s.anledningar.map(r=>`<div class="reason-row"><span class="reason-icon">✓</span><span>${r}</span></div>`).join("");
  const risks=s.risker.map(r=>`<div class="risk-row"><span class="risk-icon">⚠</span><span>${r}</span></div>`).join("");
  card.innerHTML=`
    <button class="card-row" onclick="toggleCard(this)">
      <div class="card-left"><span class="card-ticker">${s.display}</span><span class="card-sektor">${s.sektor}</span>${s.smeknamn?`<span class="card-smeknamn">${s.smeknamn}</span>`:""} ${has&&live.price?`<span class="card-live-price">${live.price.toFixed(2)} <span style="color:var(--text3);font-size:9px">${s.valuta||""}</span></span>`:'<span class="card-live-price" style="color:#2a2a2a">—</span>'}</div>
      <div class="dots">${dots}</div>
      <div class="card-right">${s.sym?`<span class="heart${favorites.has(s.sym)?" fav":""}" onclick="toggleFav(event,'${s.sym}')">♥</span>`:""} ${chHtml}<span class="card-signal">${TAGS[signal]}</span><span class="card-arrow">▼</span></div>
    </button>
    <div class="card-body">
      <div class="bar-track"><div class="bar-fill" style="width:${styrka*10}%"></div></div>
      <div class="card-name-row"><div style="display:flex;flex-direction:column;gap:2px"><span class="card-name">${s.namn}</span>${has&&live.price?`<span style="font-size:11px;color:var(--text2);font-family:monospace">${live.price.toFixed(2)}</span>`:""}</div><span class="card-styrka">Styrka ${styrka}/10</span></div>
      ${techHtml}
      ${earningsHtml}
      <div class="summary">${summary}</div>
      ${live?.momentum==="MOMENTUM_UP"?`<div style="background:#4d9fff18;border:1px solid #4d9fff44;border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:#4d9fff">⚡ Starkt momentum — RSI-signal nedviktad</div>`:""}
      <div class="section-label">${VARFOR[signal]}</div>${reasons}
      <div class="risks"><div class="section-label">RISKER</div>${risks}</div>
      <a class="invest-btn" href="${s.avanza}" target="_blank">INVESTERA PÅ AVANZA →</a>
      ${s.sym ? `<div class="news-section"><div class="section-label">SENASTE NYHETER</div><div id="news-${s.sym.replace(/[^a-zA-Z0-9]/g,'_')}"><div class="news-loading">HÄMTAR NYHETER...</div></div></div>` : ""}
    </div>`;
  return card;
}

function toggleFav(e, sym){
  e.stopPropagation();
  if(favorites.has(sym)){
    favorites.delete(sym);
  } else {
    favorites.add(sym);
  }
  localStorage.setItem("fav", JSON.stringify([...favorites]));
  // Update all hearts for this sym
  document.querySelectorAll(".heart").forEach(h=>{
    if(h.getAttribute("onclick")&&h.getAttribute("onclick").includes(sym)){
      h.classList.toggle("fav", favorites.has(sym));
    }
  });
  // Rebuild Favoriter tab if active
  if(activeTab==="Favoriter") buildFavoriterTab();
  if(activeTab==="⚡ SWING"){const sl=document.getElementById("list-⚡ SWING");if(sl)buildSwingTab(sl);}
  checkSwingNotifications();
  }

function buildFavoriterTab(){
  const list=document.getElementById("list-Favoriter");
  if(!list)return;
  list.innerHTML="";
  const favStocks=Object.values(STOCKS).flat().filter(s=>s.sym&&favorites.has(s.sym));
  if(favStocks.length===0){
    list.innerHTML='<div style="text-align:center;color:var(--text4);font-size:12px;padding:40px 20px;letter-spacing:2px">INGA FAVORITER ÄNNU<br><span style="font-size:10px;margin-top:8px;display:block">Tryck ♥ på en aktie för att lägga till</span></div>';
  } else {
    favStocks.forEach(s=>list.appendChild(buildCard(s)));
  }
}

function switchTab(cat){
  activeTab=cat;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-top").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".list").forEach(l=>l.classList.toggle("active",l.id==="list-"+cat));
  // Activate correct tab in correct row
  const allTabs=[...document.querySelectorAll(".tab"),...document.querySelectorAll(".tab-top")];
  allTabs.forEach(t=>{
    const txt=t.textContent.trim();
    if((txt==="♥ FAV"&&cat==="Favoriter")||(txt==="⚡ SWING"&&cat==="⚡ SWING")||(txt===cat)) t.classList.add("active");
  });
  if(cat==="Favoriter") buildFavoriterTab();
  if(cat==="⚡ SWING"){
    const swingList=document.getElementById("list-⚡ SWING");
    if(swingList) buildSwingTab(swingList);
  }
}
function toggleCard(btn){
  const card=btn.closest(".card");
  const was=card.classList.contains("open");
  document.querySelectorAll(".card.open").forEach(c=>c.classList.remove("open"));
  if(!was){
    card.classList.add("open");
    const realSym = card.dataset.sym;
    // Open modal for all stocks and funds
    if(realSym){
      card.classList.remove("open");
      openModal(realSym);
      return;
    }
    // Fonder har sym:null - öppna modal ändå
    const fondDisplay = card.querySelector(".card-ticker")?.textContent;
    if(fondDisplay){
      card.classList.remove("open");
      openFondModal(card);
      return;
    }
    if(realSym){
      // Load news
      const newsId = "news-" + realSym.replace(/[^a-zA-Z0-9]/g, "_");
      fetchNews(realSym, newsId);
    }
  }
}

        <button class="modal-close" onclick="closeModal({target:document.getElementById('modal-overlay')})">✕</button>
      </div>
    </div>
    ${fixedBody}
  `;

  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e){
  if(e && e.target !== document.getElementById("modal-overlay")) return;
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

  document.addEventListener("touchstart", e=>{
    if(window.scrollY > 5) return;
    startY = e.touches[0].clientY;
    pulling = true;
  }, {passive:true});

  document.addEventListener("touchmove", e=>{
    if(!pulling) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if(diff > 10 && window.scrollY <= 0){
      const pct = Math.min(diff / THRESHOLD, 1);
      ind.style.top = Math.min(diff * 0.4, 50) + "px";
      ind.classList.add("visible");
      spin.style.transform = `rotate(${pct * 360}deg)`;
    }
  }, {passive:true});

  document.addEventListener("touchend", e=>{
    if(!pulling) return;
    pulling = false;
    const diff = currentY - startY;
    if(diff > THRESHOLD && window.scrollY <= 0){
      spin.classList.add("spin");
      refreshAll().finally(()=>{
        spin.classList.remove("spin");
        ind.classList.remove("visible");
        ind.style.top = "0px";
      });
    } else {
      ind.classList.remove("visible");
      ind.style.top = "0px";
    }
    startY = 0; currentY = 0;
  }, {passive:true});
})();

// ── Swipe right/down to close modal ─────────────────────────
(function(){
  let startX = 0, startY = 0, tracking = false;
  
  document.addEventListener("touchstart", e=>{
    const overlay = document.getElementById("modal-overlay");
    if(!overlay || !overlay.classList.contains("open")) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
  }, {passive:true});

  document.addEventListener("touchend", e=>{
    if(!tracking) return;
    tracking = false;
    const overlay = document.getElementById("modal-overlay");
    if(!overlay || !overlay.classList.contains("open")) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Swipe right > 60px
    if(dx > 60 && Math.abs(dy) < 80){
      closeModal({target: overlay});
    }
    // Swipe down > 80px
    if(dy > 80 && Math.abs(dx) < 60){
      closeModal({target: overlay});
    }
  }, {passive:true});
})();

initNotifBtn();
buildUI();
// Auto-refresh var 10:e minut om appen är aktiv
setInterval(async ()=>{ 
  if(!document.hidden) await refreshAll(); 
}, 10 * 60 * 1000);

// Refresha direkt när användaren öppnar appen igen
document.addEventListener("visibilitychange", ()=>{
  if(!document.hidden) refreshAll();
});

// Ladda data direkt vid start
refreshAll();
// Previous signals - stored in memory, updated each time LADDA DATA is pressed
let prevSignals = {};

function savePrevSignals(){
  // Save current signals as "previous" before loading new ones
  const snapshot = {};
  Object.values(STOCKS).flat().filter(s=>s.sym).forEach(s=>{
    const d = liveData[s.sym];
    if(d?.ok) snapshot[s.sym] = {signal:d.signal, styrka:d.styrka, price:d.price};
  });
  if(Object.keys(snapshot).length > 0) prevSignals = snapshot;
}

// Also save daily snapshot to localStorage for week comparison

function getSignalChange(sym){
  const old = prevSignals[sym];
  const cur = liveData[sym];
  if(old && cur?.ok && old.signal !== cur.signal){
    return {from: old.signal, to: cur.signal};
  }
  return null;
}
